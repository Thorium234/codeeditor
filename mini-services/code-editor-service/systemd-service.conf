[Unit]
Description=Code Editor WebSocket Service
After=network.target

[Service]
Type=simple
User=z
WorkingDirectory=/home/z/my-project/mini-services/code-editor-service
Environment=NODE_ENV=production
ExecStart=/usr/bin/node index.js
Restart=always
RestartSec=10
StandardOutput=journal
StandardError=journal

[Install]
WantedBy=multi-user.target
